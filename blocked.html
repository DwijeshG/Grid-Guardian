<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Guardian Web - Access Blocked</title>
    <style>
        body {
            background-color: #0a0502;
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 3rem;
            background: rgba(255, 68, 68, 0.05);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: #ff4444;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #ff4444;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
        p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .details {
            text-align: left;
            background: rgba(0, 0, 0, 0.4);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .detail-item {
            margin-bottom: 0.75rem;
        }
        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 900;
            color: #ff4444;
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 0.25rem;
        }
        .value {
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        button {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .btn-primary {
            background: #ff4444;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #ff6666;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>Grid Guardian Web</h1>
        <p>Grid Guardian Web has intercepted a malicious connection attempt. This site has been identified as a security risk and has been blocked for your protection.</p>
        
        <div class="actions">
            <button class="btn-primary" id="go-back-btn">Go Back to Safety</button>
        </div>
    </div>
    <script src="blocked.js"></script>
</body>
</html>
