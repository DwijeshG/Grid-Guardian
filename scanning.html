<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Guardian Web - Scan</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #f27d26;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(242, 125, 38, 0.1);
            border-left-color: #f27d26;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .url {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            margin-top: 1rem;
            word-break: break-all;
            display: inline-block;
        }
        .status {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #f27d26;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Grid Guardian Web</div>
        <div class="spinner"></div>
        <h1>Security Analysis in Progress</h1>
        <p>Our autonomous defense engine is verifying the safety of the requested destination. This usually takes less than a second.</p>
        <div id="url-display" class="url"></div>
        <div class="status" id="status-text">Initializing Heuristic Scan...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');
        document.getElementById('url-display').textContent = targetUrl;

        const statusText = document.getElementById('status-text');
        const statuses = [
            "Initializing Heuristic Scan...",
            "Checking Global Threat Database...",
            "Analyzing SSL Certificates...",
            "Verifying Domain Reputation...",
            "Finalizing Security Assessment..."
        ];
        let statusIdx = 0;
        setInterval(() => {
            statusIdx = (statusIdx + 1) % statuses.length;
            statusText.textContent = statuses[statusIdx];
        }, 800);

        // Ultimate 4-second fail-open timeout
        const ultimateTimeout = setTimeout(() => {
            console.warn("[NEXUS] Scanning timed out. Failing open for UX.");
            window.location.replace(targetUrl);
        }, 4000);

        async function performScan() {
            if (!targetUrl) {
                window.location.href = 'about:blank';
                return;
            }

            try {
                // We use chrome.runtime.sendMessage to ask the background script to perform the scan
                chrome.runtime.sendMessage({ type: 'PERFORM_SCAN', url: targetUrl }, (response) => {
                    // Check for runtime error (e.g. background script suspended/crashed)
                    if (chrome.runtime.lastError) {
                        console.error("[NEXUS] Runtime error during scan:", chrome.runtime.lastError);
                        clearTimeout(ultimateTimeout);
                        window.location.replace(targetUrl);
                        return;
                    }

                    clearTimeout(ultimateTimeout);
                    if (response && response.isSafe) {
                        window.location.replace(targetUrl);
                    } else if (response) {
                        window.location.replace(`blocked.html?url=${encodeURIComponent(targetUrl)}&reason=${encodeURIComponent(response.threatType)}&explanation=${encodeURIComponent(response.explanation)}`);
                    } else {
                        // Fallback if response is null
                        window.location.replace(targetUrl);
                    }
                });
            } catch (e) {
                console.error('Scan failed', e);
                clearTimeout(ultimateTimeout);
                window.location.replace(targetUrl);
            }
        }

        // Start scan immediately
        performScan();
    </script>
</body>
</html>
